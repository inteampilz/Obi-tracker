services:
  obi-tracker:
    build: .
    container_name: obi_tracker
    ports:
      - "5000:5000"
    volumes:
      - tracker_data:/app/data
      # NEU: Diese Zeile reicht die Datei direkt durch. 
      # Jede Änderung auf GitHub ist nach einem Neustart sofort aktiv!
      - ./app.py:/app/app.py
    restart: unless-stopped

volumes:
  tracker_data:
